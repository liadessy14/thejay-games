<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jay Space Shooter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{overflow:hidden;background:black;touch-action:none}
canvas{display:block;background:radial-gradient(circle,#111,#000)}
#ui{
position:absolute;
top:10px;
left:10px;
color:white;
z-index:10;
font-size:18px;
text-shadow:0 0 10px cyan;
}
#gameOver{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
display:none;
text-align:center;
z-index:20;
}
#gameOver h1{font-size:50px;color:red;margin-bottom:20px}
button{
padding:12px 25px;
border:none;
border-radius:10px;
background:cyan;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>
<div id="rotateWarning" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;color:white;z-index:999;justify-content:center;align-items:center;text-align:center;padding:20px;font-size:24px;">
Please rotate your phone to PORTRAIT mode to play
</div>

<div id="ui">
<div>Score: <span id="score">0</span></div>
<div>Level: <span id="level">1</span></div>
<div>HP: <span id="hp">3</span></div>
<div>High Score: <span id="highScore">0</span></div>
</div>

<div id="startScreen" style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center;flex-direction:column;color:white;z-index:30;">
<h1 style="font-size:clamp(28px,8vw,60px);color:cyan;text-shadow:0 0 20px cyan;text-align:center;padding:0 10px;">JAY SPACE SHOOTER</h1>
<p style="margin:20px;font-size:20px;">Destroy enemy ships and survive!</p>
<button onclick="startGame()">START GAME</button>
</div>

<div id="gameOver">
<h1>GAME OVER</h1>
<button onclick="restartGame()">Restart</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

stars=[];
for(let i=0;i<100;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
});
}

if(typeof player !== 'undefined'){
player.y=canvas.height-140;

if(player.x+player.width>canvas.width){
player.x=canvas.width-player.width;
}
}
}
window.addEventListener('resize',resize);

const scoreEl=document.getElementById('score');
const levelEl=document.getElementById('level');
const hpEl=document.getElementById('hp');
const highScoreEl=document.getElementById('highScore');
const gameOverEl=document.getElementById('gameOver');

let highScore=localStorage.getItem('spaceHighScore')||0;
highScoreEl.textContent=highScore;

let score=0;
let level=1;
let hp=5;
let maxHp=10;
let gameRunning=false;
let weaponLevel=1;

const player={
x:window.innerWidth/2,
y:canvas.height-140,
width:40,
height:50,
speed:7
};

let bullets=[];
let enemies=[];
let enemyBullets=[];
let stars=[];
let hearts=[];

resize();

for(let i=0;i<100;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
});
}

const keys={};
window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>keys[e.key]=false);

canvas.addEventListener('touchmove',e=>{
e.preventDefault();
const touch=e.touches[0];

player.x=touch.clientX-player.width/2;
player.y=touch.clientY-player.height/2;

if(player.x<0)player.x=0;
if(player.x+player.width>canvas.width)player.x=canvas.width-player.width;

if(player.y<0)player.y=0;
if(player.y+player.height>canvas.height)player.y=canvas.height-player.height;
},{passive:false});

let audioCtx=null;

function initAudio(){
if(!audioCtx){
audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}
}

function shootSound(){
if(!audioCtx)return;
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
osc.type='square';
osc.frequency.value=500;
gain.gain.value=0.02;
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.08);
osc.stop(audioCtx.currentTime+0.08);
}

function explodeSound(){
if(!audioCtx)return;
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
osc.type='sawtooth';
osc.frequency.value=120;
gain.gain.value=0.04;
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.2);
osc.stop(audioCtx.currentTime+0.2);
}

function shoot(){
shootSound();
const cx=player.x+player.width/2;

if(weaponLevel===1){
bullets.push({x:cx-3,y:player.y,width:6,height:15,speed:10});
}
else if(weaponLevel===2){
bullets.push({x:cx-12,y:player.y,width:6,height:15,speed:10});
bullets.push({x:cx+6,y:player.y,width:6,height:15,speed:10});
}
else if(weaponLevel===3){
bullets.push({x:cx-18,y:player.y,width:6,height:15,speed:10});
bullets.push({x:cx-3,y:player.y,width:6,height:18,speed:12});
bullets.push({x:cx+12,y:player.y,width:6,height:15,speed:10});
}
else if(weaponLevel===4){
for(let i=-2;i<=1;i++){
bullets.push({x:cx+(i*12),y:player.y,width:6,height:16,speed:11});
}
}
else{
for(let i=-2;i<=2;i++){
bullets.push({x:cx+(i*12),y:player.y,width:6,height:18,speed:12});
}
}
}

setInterval(()=>{
if(gameRunning)shoot();
},250);

function spawnEnemy(){
enemies.push({
x:Math.random()*(canvas.width-50),
y:-60,
width:50,
height:50,
speed:2+level*0.7,
moveX:(Math.random()*2-1)*2,
cooldown:Math.random()*80
});
}

setInterval(()=>{

if(!gameRunning)return;

// Normal enemies
let normalCount=Math.min(level,4);

for(let i=0;i<normalCount;i++){
spawnEnemy();
}

// Alien progression
if(level >= 4 && level < 5){

if(Math.random()<0.5){
spawnAlien('alienRed',10);
}

}

else if(level >= 5 && level < 6){

if(Math.random()<0.4){
spawnAlien('alienGreen',30);
}

}

else if(level >= 6){

if(Math.random()<0.4){
spawnAlien('alienRed',10);
}

if(Math.random()<0.3){
spawnAlien('alienGreen',30);
}

}

},2200);



function spawnHeart(){
hearts.push({
x:Math.random()*(canvas.width-30),
y:-30,
size:22,
speed:2
});
}

setInterval(()=>{
if(gameRunning && hp<maxHp && Math.random()<0.3){
spawnHeart();
}
},6000);

function drawHearts(){
hearts.forEach((heart,index)=>{

heart.y+=heart.speed;

ctx.fillStyle='cyan';
ctx.shadowBlur=15;
ctx.shadowColor='cyan';

ctx.beginPath();
ctx.moveTo(heart.x+11,heart.y+22);
ctx.bezierCurveTo(heart.x-5,heart.y+10,heart.x+2,heart.y-5,heart.x+11,heart.y+5);
ctx.bezierCurveTo(heart.x+20,heart.y-5,heart.x+27,heart.y+10,heart.x+11,heart.y+22);
ctx.fill();

ctx.shadowBlur=0;

if(
player.x<heart.x+22 &&
player.x+player.width>heart.x &&
player.y<heart.y+22 &&
player.y+player.height>heart.y
){
if(hp<maxHp){
hp++;
hpEl.textContent=hp;
}
hearts.splice(index,1);
}

if(heart.y>canvas.height){
hearts.splice(index,1);
}

});
}

function spawnAlien(type,hpValue){
enemies.push({
type:type,
x:Math.random()*(canvas.width-55),
y:-60,
width:55,
height:30,
speed:1+level*0.12,
moveX:(Math.random()*2-1)*1.5,
cooldown:100,
hp:hpValue
});
}


function drawStars(){
ctx.fillStyle='white';
stars.forEach(star=>{
star.y+=1;
if(star.y>canvas.height){
star.y=0;
star.x=Math.random()*canvas.width;
}
ctx.fillRect(star.x,star.y,star.size,star.size);
});
}

function drawPlayer(){
ctx.fillStyle='cyan';
ctx.shadowBlur=20;
ctx.shadowColor='cyan';

ctx.beginPath();
ctx.moveTo(player.x+20,player.y);
ctx.lineTo(player.x,player.y+50);
ctx.lineTo(player.x+20,player.y+38);
ctx.lineTo(player.x+40,player.y+50);
ctx.closePath();
ctx.fill();

ctx.fillRect(player.x-5,player.y+22,15,5);
ctx.fillRect(player.x+30,player.y+22,15,5);

// JAY logo
ctx.fillStyle='purple';
ctx.beginPath();
ctx.arc(player.x+20,player.y+25,9,0,Math.PI*2);
ctx.fill();
ctx.fillStyle='white';
ctx.font='bold 10px Arial';
ctx.textAlign='center';
ctx.fillText('JAY',player.x+20,player.y+28);

ctx.shadowBlur=0;
}

function drawBullets(){
ctx.fillStyle='yellow';
bullets.forEach((b,i)=>{
b.y-=b.speed;
ctx.fillRect(b.x,b.y,b.width,b.height);
if(b.y<0)bullets.splice(i,1);
});
}

function drawEnemyBullets(){
ctx.fillStyle='orange';
enemyBullets.forEach((b,i)=>{
b.y+=b.speed;
ctx.fillRect(b.x,b.y,b.width,b.height);

if(
b.x<player.x+player.width&&
b.x+b.width>player.x&&
b.y<player.y+player.height&&
b.y+b.height>player.y
){
enemyBullets.splice(i,1);
hp--;
hpEl.textContent=hp;
explodeSound();
if(hp<=0)gameOver();
}

if(b.y>canvas.height)enemyBullets.splice(i,1);
});
}

function drawEnemies(){
enemies.forEach((enemy,eIndex)=>{
enemy.y+=enemy.speed;
enemy.x+=enemy.moveX;

if(enemy.x<=0||enemy.x+enemy.width>=canvas.width){
enemy.moveX*=-1;
}
enemy.cooldown--;

if(enemy.type==='alienRed' || enemy.type==='alienGreen'){

if(enemy.type==='alienRed'){
ctx.fillStyle='red';
ctx.shadowColor='red';
}else{
ctx.fillStyle='lime';
ctx.shadowColor='lime';
}

ctx.shadowBlur=20;

ctx.beginPath();
ctx.ellipse(enemy.x+27,enemy.y+15,20,8,0,0,Math.PI*2);
ctx.fill();

ctx.fillStyle='cyan';
ctx.beginPath();
ctx.arc(enemy.x+27,enemy.y+9,7,Math.PI,0);
ctx.fill();

ctx.fillStyle='white';
ctx.font='12px Arial';
ctx.fillText(enemy.hp,enemy.x+24,enemy.y-2);

ctx.shadowBlur=0;

if(enemy.cooldown<=0){

enemyBullets.push({
x:enemy.x+18,
y:enemy.y+20,
width:5,
height:12,
speed:2+level*0.15
});

enemyBullets.push({
x:enemy.x+34,
y:enemy.y+20,
width:5,
height:12,
speed:2+level*0.15
});

if(enemy.type==='alienGreen'){

enemyBullets.push({
x:enemy.x+26,
y:enemy.y+25,
width:5,
height:12,
speed:2+level*0.15
});

}

enemy.cooldown=Math.max(55,120-level*2);
}

}else{

if(level>=6){

const colors=['red','yellow','lime'];
ctx.fillStyle=colors[Math.floor(Math.random()*colors.length)];

}
else if(level===1){

ctx.fillStyle='red';

}
else if(level===2){

ctx.fillStyle='yellow';

}
else{

ctx.fillStyle='lime';

}

ctx.shadowBlur=15;
ctx.shadowColor=ctx.fillStyle;

ctx.beginPath();
ctx.moveTo(enemy.x+19,enemy.y+38);
ctx.lineTo(enemy.x,enemy.y);
ctx.lineTo(enemy.x+19,enemy.y+12);
ctx.lineTo(enemy.x+38,enemy.y);
ctx.closePath();
ctx.fill();

ctx.shadowBlur=0;

if(enemy.cooldown<=0){
enemyBullets.push({
x:enemy.x+18,
y:enemy.y+28,
width:5,
height:12,
speed:2+level*0.15
});
enemy.cooldown=Math.max(60,120-level*2);
}

}

bullets.forEach((bullet,bIndex)=>{
if(
bullet.x<enemy.x+enemy.width&&
bullet.x+bullet.width>enemy.x&&
bullet.y<enemy.y+enemy.height&&
bullet.y+bullet.height>enemy.y
){
bullets.splice(bIndex,1);

if(enemy.type==='alienRed' || enemy.type==='alienGreen'){

enemy.hp--;

if(enemy.hp<=0){
enemies.splice(eIndex,1);
score+=30;
}

}else{

enemies.splice(eIndex,1);
score+=10;

}
scoreEl.textContent=score;

level=Math.floor(score/100)+1;
levelEl.textContent=level;

weaponLevel=Math.min(5,Math.floor(level/2)+1);

explodeSound();

if(score>highScore){
highScore=score;
localStorage.setItem('spaceHighScore',highScore);
highScoreEl.textContent=highScore;
}
}
});

if(
player.x<enemy.x+enemy.width&&
player.x+player.width>enemy.x&&
player.y<enemy.y+enemy.height&&
player.y+player.height>enemy.y
){

enemies.splice(eIndex,1);

hp--;

if(hp<0){
hp=0;
}

hpEl.textContent=hp;

explodeSound();

if(hp<=0){
gameOver();
}

}
});
}

function movePlayer(){
if(keys['ArrowLeft']||keys['a'])player.x-=player.speed;
if(keys['ArrowRight']||keys['d'])player.x+=player.speed;
if(keys['ArrowUp']||keys['w'])player.y-=player.speed;
if(keys['ArrowDown']||keys['s'])player.y+=player.speed;

if(player.x<0)player.x=0;
if(player.x+player.width>canvas.width)player.x=canvas.width-player.width;
if(player.y<0)player.y=0;
if(player.y+player.height>canvas.height)player.y=canvas.height-player.height;
}

function gameOver(){
gameRunning=false;
gameOverEl.style.display='block';
}

function startGame(){
initAudio();

if(audioCtx.state==='suspended'){
audioCtx.resume();
}

gameRunning=true;
document.getElementById('startScreen').style.display='none';
}

function restartGame(){
player.x=canvas.width/2;
player.y=canvas.height-140;
score=0;
level=1;
hp=5;
weaponLevel=1;
scoreEl.textContent=score;
levelEl.textContent=level;
hpEl.textContent=hp;
bullets=[];
enemies=[];
enemyBullets=[];
gameRunning=true;
gameOverEl.style.display='none';
}

function checkOrientation(){
const warning=document.getElementById('rotateWarning');
const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

if(isMobile && window.innerWidth>window.innerHeight){
warning.style.display='flex';
gameRunning=false;
}else{
warning.style.display='none';

if(document.getElementById('startScreen').style.display==='none' && hp>0){
gameRunning=true;
}
}
}

window.addEventListener('resize',checkOrientation);
checkOrientation();

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
drawStars();
drawHearts();

if(gameRunning){
movePlayer();
drawPlayer();
drawBullets();
drawEnemyBullets();
drawEnemies();
}

requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
